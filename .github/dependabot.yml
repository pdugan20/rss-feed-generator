version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'wednesday'
      time: '06:00'
      timezone: 'America/Los_Angeles'
    open-pull-requests-limit: 2
    commit-message:
      # Type must be a single word (no hyphens) for the conventional-commits
      # parser used by PR Lint. `include: scope` adds `(deps)` / `(deps-dev)`
      # automatically — hyphen in the scope is fine.
      prefix: 'chore'
      include: 'scope'
    labels:
      - 'dependencies'
      - 'npm'
    assignees:
      - 'pdugan20'
    reviewers:
      - 'pdugan20'
    # Skip major-version bumps — they regularly break CI and need a human.
    ignore:
      - dependency-name: '*'
        update-types: ['version-update:semver-major']
    groups:
      prettier:
        dependency-type: 'development'
        patterns: ['prettier']
        update-types:
          - 'minor'
          - 'patch'
      dev-dependencies:
        dependency-type: 'development'
        exclude-patterns: ['prettier']
        update-types:
          - 'minor'
          - 'patch'
      production-dependencies:
        dependency-type: 'production'
        update-types:
          - 'minor'
          - 'patch'

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'wednesday'
      time: '06:30'
      timezone: 'America/Los_Angeles'
    open-pull-requests-limit: 1
    commit-message:
      prefix: 'ci'
    labels:
      - 'dependencies'
      - 'github-actions'
    assignees:
      - 'pdugan20'
    reviewers:
      - 'pdugan20'
    groups:
      github-actions:
        patterns: ['*']
        update-types:
          - 'minor'
          - 'patch'
